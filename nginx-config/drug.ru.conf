#=============================================================================#
#  SERVER 1: Основной (HTTPS + HTTP)                                          #
#  Порты: 443 (SSL), 80                                                      #
#  Полный функционал: статика, HTML, PHP, авторизация                         #
#=============================================================================#
server {
    listen 443 ssl;
    listen 80;
    
    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    server_name drug.ru;

    root /var/www/drug.ru;
    index index.html;

    # ---------- Обработка ошибки 404 ----------
    error_page 404 /error_404.html;
    location = /error_404.html {
        root /var/www/drug.ru/html;
        internal;
    }

    # ---------- Точные совпадения (высший приоритет) ----------
    location = / {
        try_files /index.html =404;
    }

    location = /user {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        alias /var/www/drug.ru/html;
        try_files /user.html =404;
    }

    # ---------- Приоритет 1: статические директории (^~ блокирует regex) ----------
    location ^~ /js/ {
        alias /var/www/drug.ru/js/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
        add_header X-Debug-Location "js location hit" always;
        add_header X-Real-Path "/var/www/drug.ru/js/$uri" always;
    }

    location ^~ /image/ {
        alias /var/www/drug.ru/image/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ^~ /docs/ {
        alias /var/www/drug.ru/docs/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # ---------- Приоритет 2: файлы по расширениям (regex) ----------
    location ~* \.css$ {
        # style.css лежит прямо в корне
        try_files /style.css =404;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(jpg|jpeg|png|gif|avif)$ {
        root /var/www/drug.ru/image;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(pdf|doc|docx)$ {
        root /var/www/drug.ru/docs;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # ---------- Приоритет 3: динамические страницы (HTML и PHP) ----------
    location ~* \.html$ {
        alias /var/www/drug.ru/html;
        try_files $uri =404;
        expires 1d;
    }

    location ~* \.php$ {
        # PHP-файлы в поддиректории html/php/
        alias /var/www/drug.ru/html/php/;
        fastcgi_pass php-fpm:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        try_files $uri =404;
        expires 1d;
    }

    # ---------- Всё остальное → 404 ----------
    location / {
        return 404;
    }
}

#=============================================================================#
#  SERVER 2: Дополнительный HTTP (порт 8084)                                  #
#  Тот же функционал, что и основной сервер (без SSL)                         #
