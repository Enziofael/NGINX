    }

    location ^~ /image/ {
        alias /var/www/drug.ru/image/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ^~ /docs/ {
        alias /var/www/drug.ru/docs/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.css$ {
        try_files /style.css =404;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(jpg|jpeg|png|gif|avif)$ {
        root /var/www/drug.ru/image;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(pdf|doc|docx)$ {
        root /var/www/drug.ru/docs;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.html$ {
        alias /var/www/drug.ru/html;
        try_files $uri =404;
        expires 1d;
    }

    location ~* \.php$ {
        alias /var/www/drug.ru/html/php/;
        fastcgi_pass php-fpm:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        try_files $uri =404;
        expires 1d;
    }

    location / {
        return 404;
    }
}

#=============================================================================#
#  SERVER 3: Выделенный PHP-сервер (порт 8081)                                #
#  Аналогичен основному, но index по умолчанию index.php                       #
#=============================================================================#
server {
    listen 8081;
    server_name drug.ru;

    root /var/www/drug.ru;
    index index.php;

    error_page 404 /error_404.html;
    location = /error_404.html {
        root /var/www/drug.ru/html;
        internal;
    }

    # Корень обрабатывается через PHP (index.php)
    location = / {
        fastcgi_pass php-fpm:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location = /user {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        alias /var/www/drug.ru/html;
        try_files /user.html =404;
    }

    location ^~ /js/ {
        alias /var/www/drug.ru/js/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
        add_header X-Debug-Location "js location hit" always;
        add_header X-Real-Path "/var/www/drug.ru/js/$uri" always;
    }

    location ^~ /image/ {
        alias /var/www/drug.ru/image/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ^~ /docs/ {
        alias /var/www/drug.ru/docs/;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.css$ {
        try_files /style.css =404;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(jpg|jpeg|png|gif|avif)$ {
        root /var/www/drug.ru/image;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.(pdf|doc|docx)$ {
        root /var/www/drug.ru/docs;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # PHP-файлы в корне или поддиректориях
    location ~ \.php$ {
        # Обрабатываем все PHP-файлы, путь строится от $document_root
        fastcgi_pass php-fpm:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Обычные HTML-страницы (если понадобятся)
    location ~* \.html$ {
        alias /var/www/drug.ru/html;
        try_files $uri =404;
        expires 1d;
    }

    location / {
        return 404;
    }
}